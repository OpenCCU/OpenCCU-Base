<table id="dialogContent" style="margin: 0 auto;">
  <tbody>
    <tr>
      <td>${lblDisplayID}: </td>
      <td>
        <select id="weatherDisplayID">
          <option value="0">${optionPicture} 1</option>
          <option value="1">${optionPicture} 2</option>
          <option value="2">${optionPicture} 3</option>
          <option value="3">${optionPicture} 4</option>
          <option value="4">${optionPicture} 5</option>
          <option value="5">${optionPicture} 6</option>
          <option value="6">${optionPicture} 7</option>
          <option value="7">${optionPicture} 8</option>

        </select>
        <img src="/ise/img/help.png" style="cursor: pointer; width: 18px; height:18px;" alt="" onclick="showHelp('helpCombinedParameterDisplayIDWeather', 450,120);">
      </td>
    </tr>
    <tr>
      <td>${lblDisplayText}:</td>
      <td>
        <input id="weatherDisplayText" type="text">
        <img src="/ise/img/help.png" style="cursor: pointer; width: 18px; height:18px;" alt="" onclick="showHelp('helpCombinedParameterDisplayTextWeather', 450,120);">
      </td>
    </tr>

  </tbody>
</table>
